name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --features use_libc -- -D warnings
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.features || 'default' }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        features: ["", "use_libc"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test ${{ matrix.features && '--features' }} ${{ matrix.features }}
      - name: Smoke test (hello_world)
        run: cargo run --example hello_world ${{ matrix.features && '--features' }} ${{ matrix.features }}
